  text: Where is the "secrets.txt"  file located? (Full path of the file)
  hint: "You can use any of these commands: \nsearch -f *.txt \nsearch -f secrets.txt"
  answer: c:\Program Files (x86)\Windows Multimedia Platform\secrets.txt
  no_answer: false
  answer_format: ''
