id: thm-nmap01
platform: tryhackme
name: Nmap Live Host Discovery
url: https://tryhackme.com/room/nmap01
difficulty: medium
estimated_time: 120
skills: &id001
- nmap-basics
prerequisites:
  rooms: []
  skills: []
brief: Learn how to use Nmap to discover live hosts using ARP scan, ICMP scan, and TCP/UDP ping scan.
questions:
- id: t1-q1
  text: Some of these questions will require the use of a static site to answer the task questions, while
    others require the use of the AttackBox.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t2-q1
  text: 'Send a packet with the following:


    - From computer1

    To computer1 (to indicate it is broadcast)


    - Packet Type: “ARP Request”


    - Data: computer6 (because we are asking for computer6 MAC address using ARP Request)


    How many devices can see the ARP Request?'
  hint: Do not count the switch when counting devices.
  answer: '4'
  no_answer: false
  answer_format: ''
- id: t2-q2
  text: Did computer6 receive the ARP Request? (Y/N)
  hint: ''
  answer: N
  no_answer: false
  answer_format: ''
- id: t2-q3
  text: 'Send a packet with the following:


    - From computer4


    - To computer4 (to indicate it is broadcast)


    - Packet Type: “ARP Request”


    - Data: computer6 (because we are asking for computer6 MAC address using ARP Request)


    How many devices can see the ARP Request?'
  hint: Do not count the switch when counting devices.
  answer: '4'
  no_answer: false
  answer_format: ''
- id: t2-q4
  text: Did computer6 reply to the ARP Request? (Yea/Nay)
  hint: ''
  answer: Yea
  no_answer: false
  answer_format: ''
- id: t3-q1
  text: What is the first IP address Nmap would scan if you provided 10.10.12.13/29` as your target?
  hint: Run nmap -sL -n 10.10.12.13/29.
  answer: 10.10.12.8
  no_answer: false
  answer_format: ''
- id: t3-q2
  text: How many IP addresses will Nmap scan if you provide the following range 10.10.0-255.101-125`?
  hint: Run nmap -sL -n 10.10.0-255.101-125.
  answer: '6400'
  no_answer: false
  answer_format: ''
- id: t4-q1
  text: 'Send a packet with the following:


    - From computer1


    - To computer3


    - Packet Type: “Ping Request”


    What type of packet did computer1 send before the ping?'
  hint: ''
  answer: ARP Request
  no_answer: false
  answer_format: ''
- id: t4-q2
  text: What type of packet did computer1 receive before it was able to send the ping?
  hint: ''
  answer: ARP Response
  no_answer: false
  answer_format: ''
- id: t4-q3
  text: How many computers responded to the ping request?
  hint: ''
  answer: '1'
  no_answer: false
  answer_format: ''
- id: t4-q4
  text: 'Send a packet with the following:


    - From computer2


    - To computer5


    - Packet Type: “Ping Request”


    What is the name of the first device that responded to the first ARP Request?'
  hint: ''
  answer: router
  no_answer: false
  answer_format: ''
- id: t4-q5
  text: What is the name of the first device that responded to the second ARP Request?
  hint: ''
  answer: computer5
  no_answer: false
  answer_format: ''
- id: t4-q6
  text: Send another Ping Request. Did it require new ARP Requests? (yea/nay)
  hint: ''
  answer: nay
  no_answer: false
  answer_format: ''
- id: t5-q1
  text: 'We will be sending broadcast ARP Request packets with the following options:


    - From computer1


    - To computer1 (to indicate it is broadcast)


    - Packet Type: “ARP Request”


    - Data: try all 8 devices (other than computer1) on the network: computer2, computer3, computer4,
    computer5, computer6, switch1, switch2, and router.


    How many devices can you discover using ARP requests?'
  hint: ''
  answer: '3'
  no_answer: false
  answer_format: ''
- id: t6-q1
  text: What is the option required to tell Nmap to use ICMP Timestamp to discover live hosts?
  hint: ''
  answer: -PP
  no_answer: false
  answer_format: ''
- id: t6-q2
  text: What is the option required to tell Nmap to use ICMP Address Mask to discover live hosts?
  hint: ''
  answer: -PM
  no_answer: false
  answer_format: ''
- id: t6-q3
  text: What is the option required to tell Nmap to use ICMP Echo to discover live hosts?
  hint: ''
  answer: -PE
  no_answer: false
  answer_format: ''
- id: t7-q1
  text: Which TCP ping scan does not require a privileged account?
  hint: ''
  answer: TCP SYN Ping
  no_answer: false
  answer_format: ''
- id: t7-q2
  text: Which TCP ping scan requires a privileged account?
  hint: ''
  answer: TCP ACK Ping
  no_answer: false
  answer_format: ''
- id: t7-q3
  text: What option do you need to add to Nmap to run a TCP SYN ping scan on the telnet port?
  hint: Telnet uses port 23
  answer: -PS23
  no_answer: false
  answer_format: ''
- id: t8-q1
  text: We want Nmap to issue a reverse DNS lookup for all the possibles hosts on a subnet, hoping to
    get some insights from the names. What option should we add?
  hint: ''
  answer: -R
  no_answer: false
  answer_format: ''
- id: t9-q1
  text: Ensure you have taken note of all the Nmap options explained in this room. To continue learning
    about Nmap, please join the room Nmap Basic Port Scans, which introduces the basic types of port scans.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
