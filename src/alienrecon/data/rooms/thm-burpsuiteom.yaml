- id: t3-q4
  text: 'Encode this phrase: `Encoding Challenge`.

    Start with base64 encoding. Take the output of this and convert it into ASCII Hex. Finally, encode
    the hex string into octal.

    What is the final string?'
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q1
  text: 'Using Decoder, what is the SHA-256 hashsum of the phrase: `Let''s get Hashing!`?

    Convert this into an ASCII Hex string for the answer to this question.'
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q2
  text: 'Generate an MD4 hashsum of the phrase: `Insecure Algorithms`.

    Encode this as base64 (not ASCII Hex) before submitting.'
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q3
  text: 'Let''s look at an in-context example:


    First, download the file attached to this task.

    Note: This file can also be downloaded from the deployed VM with `wget http://MACHINE_IP:9999/AlteredKeys.zip` — you
    may find this helpful if you are using the AttackBox.

    Now read the problem specification below:


    "Some joker has messed with my SSH key! There are four keys in the directory, and I have no idea which
    is the real one. The MD5 hashsum for my key is `3166226048d6ad776370dc105d40d9f8` — could you find
    it for me?"

    What is the correct key name?'
  hint: Copy and paste each of the keys into Decoder and hash them with the MD5 algorithm one by one.
    You are looking for the key that has an MD5 hashsum equal to the one in the question. Ensure you don't
    remove the final newline from the end of the keys!
  answer: ''
  no_answer: false
  answer_format: ''
