brief: Learn how to use simple tools such as traceroute, ping, telnet, and a web browser to gather information.
questions:
- id: t1-q1
  text: Ensure that you understand why these tools fall under active reconnaissance. Launch your AttackBox
    and ensure that it is ready. You will need it to answer the questions, especially in later tasks.
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t2-q1
  text: Browse to the following website and ensure that you have opened your Developer Tools on AttackBox
    Firefox, or the browser on your computer. Using the Developer Tools, figure out the total number of
    questions.
  hint: Locate the JavaScript file script.js. Inspect the file and figure out the total number of questions.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q1
  text: Which option would you use to set the size of the data carried by the ICMP echo request?
  hint: 'Use the "man ping" command on a Linux system to consult ping''s manual pages. Alternatively,
    check the following extract from the manual page: ping [-c count] [-i interval] [-I interface] [-W
    timeout] [-p pattern] [-s packetsize] [-t ttl] [-T timestamp option] [hop...] {destination} '
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q2
  text: What is the size of the ICMP header in bytes?
  hint: Use the "man ping" command to consult ping's manual pages.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q3
  text: Does MS Windows Firewall block ping by default? (Y/N)
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q4
  text: Deploy the VM for this task and using the AttackBox terminal, issue the command ping -c 10 MACHINE_IP`.
    How many ping replies did you get back?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q1
  text: In Traceroute A, what is the IP address of the last router/hop before reaching tryhackme.com?
  hint: If there is more than one IP address, provide the first one that responded.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q2
  text: In Traceroute B, what is the IP address of the last router/hop before reaching tryhackme.com?
  hint: If there is more than one IP address, provide the first one that responded.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q3
  text: In Traceroute B, how many routers are between the two systems?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q4
  text: Start the attached VM from Task 3 if it is not already started. On the AttackBox, run traceroute
    MACHINE_IP`. Check how many routers/hops are there between the AttackBox and the target VM.
  hint: If traceroute is not installed, you can install it with apt install traceroute.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t5-q1
  text: Start the attached VM from Task 3 if it is not already started. On the AttackBox, open the terminal
    and use the telnet client to connect to the VM on port 80. What is the name of the running server?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t5-q2
  text: What is the version of the running server (on port 80 of the VM)?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t6-q1
  text: Start the VM and open the AttackBox. Once the AttackBox loads, use Netcat to connect to the VM
    port 21. What is the version of the running server?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t7-q1
  text: Ensure that you gain mastery over the different basic yet essential tools we presented in this
    room before moving on to more sophisticated tools.
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
