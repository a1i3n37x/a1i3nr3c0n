questions:
- id: t1-q1
  text: Ensure you have a solid understanding of how the Nmap scan progresses and the steps and stages
    it follows. Launch the AttackBox by using the Start AttackBox button, as you will need it to answer
    the questions in later tasks.
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t2-q1
  text: Start the target machine for this task and launch the AttackBox. Run nmap -sV --version-light
    MACHINE_IP`via the AttackBox. What is the detected version for port 143?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t2-q2
  text: Which service did not have a version detected with --version-light`?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q1
  text: Run nmap` with -O` option against MACHINE_IP`. What OS did Nmap detect?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q1
  text: Knowing that Nmap scripts are saved in /usr/share/nmap/scripts` on the AttackBox. What does the
    script http-robots.txt` check for?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q2
  text: Can you figure out the name for the script that checks for the remote code execution vulnerability
    MS15-034 (CVE2015-1635)?
  hint: This script falls under HTTP.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q3
  text: Launch the AttackBox if you haven't already. After you ensure you have terminated the VM from
    Task 2, start the target machine for this task. On the AttackBox, run Nmap with the default scripts -sC` against MACHINE_IP`.
    You will notice that there is a service listening on port 53. What is its full version value?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q4
  text: Based on its description, the script ssh2-enum-algos` “reports the number of algorithms (for encryption,
    compression, etc.) that the target SSH2 server offers.” What is the name of the server host key algorithm
    that relies on SHA2-512 and is supported by `MACHINE_IP`?
  hint: 'Run the command: nmap –script “ssh2-enum-algos” MACHINE_IP'
  answer: ''
  no_answer: false
  answer_format: ''
- id: t5-q1
  text: 'Terminate the target machine of the previous task and start the target machine for this task.
    On the AttackBox terminal, issue the command scp pentester@MACHINE_IP:/home/pentester/* .` to download
    the Nmap reports in normal and grepable formats from the target virtual machine.

    Note that the username pentester` has the password THM17577`

    Check the attached Nmap logs. How many systems are listening on the HTTPS port?'
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t5-q2
  text: What is the IP address of the system listening on port 8089?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t6-q1
  text: This room concludes the Nmap series of 4 rooms. Ensure you have taken note of all the Nmap options
    explained in this room and previous ones.
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
