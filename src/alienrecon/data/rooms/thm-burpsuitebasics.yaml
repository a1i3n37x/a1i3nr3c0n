brief: An introduction to using Burp Suite for web application pentesting.
questions:
- id: t1-q1
  text: Let us start!
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t2-q1
  text: Which edition of Burp Suite runs on a server and provides constant scanning for target web apps?
  hint: ''
  answer: Burp Suite Enterprise
  no_answer: false
  answer_format: ''
- id: t2-q2
  text: Burp Suite is frequently used when attacking web applications and ______ applications.
  hint: Fill in the blank.
  answer: Mobile
  no_answer: false
  answer_format: ''
- id: t3-q1
  text: Which Burp Suite feature allows us to intercept requests between ourselves and the target?
  hint: ''
  answer: Proxy
  no_answer: false
  answer_format: ''
- id: t3-q2
  text: Which Burp tool would we use to brute-force a login form?
  hint: ''
  answer: Intruder
  no_answer: false
  answer_format: ''
- id: t4-q1
  text: If you have chosen not to use the AttackBox, ensure that you have a copy of Burp Suite installed
    before proceeding.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t5-q1
  text: What menu provides information about the actions performed by Burp Suite, such as starting the
    proxy, and details about connections made through Burp?
  hint: ''
  answer: Event log
  no_answer: false
  answer_format: ''
- id: t6-q1
  text: Which tab Ctrl + Shift + P will switch us to?
  hint: ''
  answer: Proxy tab
  no_answer: false
  answer_format: ''
- id: t7-q1
  text: In which category can you find a reference to a "Cookie jar"?
  hint: ''
  answer: Sessions
  no_answer: false
  answer_format: ''
- id: t7-q2
  text: In which base category can you find the "Updates" sub-category, which controls the Burp Suite
    update behaviour?
  hint: If your answer to this question is "Misc", then you are using an outdated version of Burp Suite.
    Update to the latest version, then search for the answer in the settings window.
  answer: Suite
  no_answer: false
  answer_format: ''
- id: t7-q3
  text: What is the name of the sub-category which allows you to change the keybindings for shortcuts
    in Burp Suite?
  hint: ''
  answer: Hotkeys
  no_answer: false
  answer_format: ''
- id: t7-q4
  text: If we have uploaded Client-Side TLS certificates, can we override these on a per-project basis
    (yea/nay)?
  hint: Search for "Client TLS Certificates", then look at the scopes provided to the right of the section
    heading.
  answer: yea
  no_answer: false
  answer_format: ''
- id: t8-q1
  text: Click me to proceed to the next task.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t9-q1
  text: Click me to proceed to the next task.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t10-q1
  text: What is the flag you receive after visiting the unusual endpoint?
  hint: You are looking for a suspicious page with a name made up of a series of random letters and numbers.
  answer: THM{NmNlZTliNGE1MWU1ZTQzMzgzNmFiNWVk}
  no_answer: false
  answer_format: ''
- id: t11-q1
  text: Click me to proceed to the next task.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t12-q1
  text: "Add `http://MACHINE_IP/` to your scope and change the proxy settings to only intercept traffic\
    \ to in-scope targets. \nSee the difference between the amount of traffic getting caught by the proxy\
    \ before and after limiting the scope."
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t13-q1
  text: If you are not using the AttackBox, configure Firefox (or your browser of choice) to accept the
    PortSwigger CA certificate for TLS communication through the Burp Proxy.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t14-q1
  text: Click me to proceed to the next task.
  hint: ''
  answer: ''
