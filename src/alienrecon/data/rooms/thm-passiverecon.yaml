id: thm-passiverecon
platform: tryhackme
name: Passive Reconnaissance
url: https://tryhackme.com/room/passiverecon
difficulty: easy
estimated_time: 60
skills: &id001
- reconnaissance
- subdomain-enumeration
prerequisites:
  rooms: []
  skills: []
brief: Learn about the essential tools for passive reconnaissance, such as whois, nslookup, and dig.
questions:
- id: t1-q1
  text: This room does not use a target virtual machine (VM) to demonstrate the discussed topics. Instead,
    we will query public WHOIS servers and DNS servers for domains owned by TryHackMe. Start the AttackBox
    and make sure it is ready. You will use the AttackBox to answer the questions in later tasks, especially
    tasks 3 and 4.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
- id: t2-q1
  text: You visit the Facebook page of the target company, hoping to get some of their employee names.
    What kind of reconnaissance activity is this? (A for active, P for passive)
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t2-q2
  text: You ping the IP address of the company webserver to check if ICMP traffic is blocked. What kind
    of reconnaissance activity is this? (A for active, P for passive)
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t2-q3
  text: You happen to meet the IT administrator of the target company at a party. You try to use social
    engineering to get more information about their systems and network infrastructure. What kind of reconnaissance
    activity is this? (A for active, P for passive)
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q1
  text: When was TryHackMe.com registered?
  hint: Use the format YYYYMMDD
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q2
  text: What is the registrar of TryHackMe.com?
  hint: Give its domain name
  answer: ''
  no_answer: false
  answer_format: ''
- id: t3-q3
  text: Which company is TryHackMe.com using for name servers?
  hint: Give its domain name
  answer: ''
  no_answer: false
  answer_format: ''
- id: t4-q1
  text: Check the TXT records of thmlabs.com. What is the flag there?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t5-q1
  text: Lookup tryhackme.com on DNSDumpster. What is one interesting subdomain that you would discover
    in addition to www and blog?
  hint: ''
  answer: ''
  no_answer: false
  answer_format: ''
- id: t6-q1
  text: According to Shodan.io, what is the first country in the world in terms of the number of publicly
    accessible Apache servers?
  hint: To find the answer, you can search for Apache on Shodan.io.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t6-q2
  text: Based on Shodan.io, what is the 3rd most common port used for Apache?
  hint: To find the answer, you can search for Apache on Shodan.io.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t6-q3
  text: Based on Shodan.io, what is the most common port used for nginx?
  hint: To find the answer, you can search for nginx on Shodan.io.
  answer: ''
  no_answer: false
  answer_format: ''
- id: t7-q1
  text: Make sure you note all the points discussed in this room, especially the syntax for the command-line
    tools.
  hint: ''
  answer: ''
  no_answer: true
  answer_format: ''
